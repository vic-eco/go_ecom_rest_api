version: "2"
sql:
  - engine: "postgresql"
    queries:
      - "./internal/postgresql/sqlc/products.sql"
      - "./internal/postgresql/sqlc/orders.sql"
    schema: "./internal/postgresql/migrations"
    gen:
      go:
        package: "repo"
        out: "./internal/postgresql/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true